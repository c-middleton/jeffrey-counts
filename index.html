<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta
      name="description"
      content="Jeffrey Counts boats on the lake."
    >
    <meta name="theme-color" content="#123c55">
    <meta property="og:title" content="Jeffrey Counts">
    <meta property="og:description" content="Count boats before they drift away.">
    <meta property="og:image" content="assets/jeffrey-counts-landing-desktop.jpg">
    <title>Jeffrey Counts</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="home-screen active" id="home-screen" aria-label="Jeffrey Counts boat counter">
        <div class="hero">
          <div class="art-wrap">
            <picture>
              <source
                srcset="assets/jeffrey-counts-landing-mobile.jpg"
                media="(max-width: 760px)"
              >
              <img
                class="brand-art"
                src="assets/jeffrey-counts-landing-desktop.jpg"
                alt="Illustration of Jeffrey Counts driving a pontoon boat on a lake"
              >
            </picture>
          </div>

          <div class="intro">
            <button class="primary-button" type="button" data-action="count-boats">
              Count Boats
            </button>
          </div>
        </div>
      </section>

      <section class="counter-screen" id="counter-screen" aria-labelledby="counter-title">
        <header class="counter-header">
          <button class="icon-button" type="button" data-action="home" aria-label="Back">
            <span aria-hidden="true">&lt;</span>
          </button>
          <div>
            <p class="eyebrow">Jeffrey Counts</p>
            <h1 id="counter-title">Count Boats</h1>
          </div>
          <button class="sound-toggle" type="button" data-action="toggle-sound" aria-pressed="true">
            Sound On
          </button>
        </header>

        <section class="counter-panel" aria-labelledby="category-title">
          <div class="section-heading compact">
            <h2 id="category-title">Tap a Boat</h2>
            <p class="muted" id="saved-total">0 total</p>
          </div>
          <div class="category-grid" id="category-grid"></div>
        </section>

        <section class="history-section" aria-labelledby="history-title">
          <div class="section-heading">
            <h2 id="history-title">Recent Counts</h2>
          </div>
          <div class="history-list" id="history-list"></div>
        </section>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
